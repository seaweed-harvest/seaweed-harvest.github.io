<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <title>Seaweed Harvest</title>
  <link rel="preload" as="image" href="./assets/images/seaweed-harvest-logo.svg" type="image/svg+xml">
  <link rel="preload" as="image" href="./assets/images/seaweed-harvest-login-sway.gif">
  <link rel="stylesheet" href="./assets/css/ag.css">
</head>
<body class="auth-page auth-gateway-page" data-auth-pending>
  <div class="auth-session-loader" role="status" aria-label="Checking your account">
    <img src="./assets/images/seaweed-harvest-logo.svg" alt="" fetchpriority="high">
  </div>
  <main class="auth-shell auth-gateway-shell">
    <div class="auth-brand-animation" aria-label="Seaweed Harvest">
      <img class="auth-brand-logo auth-brand-logo-animated" src="./assets/images/seaweed-harvest-login-sway.gif" alt="Seaweed Harvest" fetchpriority="high">
    </div>

    <a class="auth-collection-link" href="./collection.html">Collection form</a>

    <section class="panel auth-panel" id="loginPanel">
      <h1>Sign In</h1>
      <form id="loginForm" class="stack-form">
        <label>Email or phone number<input id="loginEmail" type="text" autocomplete="username" required></label>
        <label>Password<input id="loginPassword" type="password" autocomplete="current-password" required></label>
        <button type="submit">Sign in</button>
      </form>
      <div id="socialLoginActions" class="auth-secondary-actions" hidden>
        <button id="googleSignIn" type="button">Continue with Google</button>
        <button id="facebookSignIn" type="button">Continue with Facebook</button>
      </div>
      <div class="auth-links">
        <a href="./register.html">Make account</a>
        <button id="showResetPassword" type="button" class="text-button">Reset password</button>
      </div>
    </section>

    <section class="panel auth-panel" id="passwordPanel" hidden>
      <h1 id="passwordPanelTitle">Change Password</h1>
      <form id="passwordForm" class="stack-form">
        <label>Name<input id="accountDisplayName" type="text" autocomplete="name" minlength="2" maxlength="100" required></label>
        <label>New password<input id="newPassword" type="password" autocomplete="new-password" minlength="10" required></label>
        <label>Confirm password<input id="confirmPassword" type="password" autocomplete="new-password" minlength="10" required></label>
        <button type="submit">Save password</button>
      </form>
      <button id="cancelPasswordUpdate" type="button" class="text-button auth-back-button">Back to sign in</button>
    </section>

    <section class="panel auth-panel" id="resetPanel" hidden>
      <h1>Sign-in Help</h1>
      <form id="resetForm" class="stack-form">
        <label>Email<input id="resetEmail" type="email" autocomplete="email" required></label>
        <button type="submit">Send reset link</button>
      </form>
      <div class="auth-help-divider"><span>or</span></div>
      <form id="assistedResetForm" class="stack-form">
        <p class="auth-help-copy">No email access? Ask an administrator to help reset the account.</p>
        <label>Name<input id="assistedResetName" type="text" autocomplete="name" minlength="2" maxlength="100" required></label>
        <label>Email or phone number<input id="assistedResetContact" type="text" autocomplete="username" required></label>
        <button type="submit">Request administrator help</button>
      </form>
      <button id="cancelResetPassword" type="button" class="text-button">Back to sign in</button>
    </section>

    <p id="authStatus" class="form-status" aria-live="polite"></p>
  </main>

  <div id="authSuccessTransition" class="brand-transition" role="status" aria-label="Opening Seaweed Harvest" hidden>
    <img src="./assets/images/seaweed-harvest-splash.gif" alt="">
  </div>

  <script type="module" src="./assets/js/login_page.js?v=20"></script>
</body>
</html>
