<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <meta name="robots" content="noindex,nofollow">
  <title>Stabilization &amp; Packing - Seaweed Aggregation</title>
  <link rel="stylesheet" href="./assets/css/ag.css">
</head>
<body class="admin-console-page packing-record-page">
  <header class="app-header">
    <div class="app-header-inner">
      <div><p class="eyebrow">Seaweed aggregation</p><h1>Admin</h1></div>
      <div class="header-actions admin-header-controls">
        <nav class="app-nav" aria-label="Main navigation"><a href="./collection.html">Collection</a><a href="./home.html">Home</a></nav>
      </div>
    </div>
  </header>
  <main class="app-shell admin-shell admin-layout">
    <aside class="admin-sidebar" aria-label="Admin menu">
      <h2>Admin</h2><a href="./home.html">Dashboard</a>
      <p class="admin-menu-heading">Registry</p><a href="./admin_member_registry.html">Member Registry</a><a href="./admin_community_registry.html">Community Registry</a>
      <p class="admin-menu-heading">Map</p><a href="./admin_map.html">Community Map</a>
      <p class="admin-menu-heading">Records</p><a href="./admin_today.html">Today's Intake</a><a href="./admin_monthly.html">Monthly</a><a href="./admin_community.html">Per Community</a><a href="./admin_ledger.html">Collection Ledger</a>
      <p class="admin-menu-heading">Tools</p><a href="./tags.html">Tags</a>
    </aside>
    <section class="admin-content admin-page-section">
      <section class="panel">
        <div class="section-head compact"><h2>Stabilization &amp; Packing Record</h2></div>
        <form id="packingRecordForm" class="packing-record-form">
          <fieldset>
            <legend>Record</legend>
            <label>Carton serial
              <input id="cartonSerial" type="text" inputmode="numeric" pattern="[0-9]+" maxlength="30" autocomplete="off" required>
            </label>
            <label>Packing date
              <input id="packedOn" type="date" required>
            </label>
            <label>Species
              <select id="packingSpecies" required>
                <option value="spinosum">Spinosum</option>
                <option value="cottonii">Cottonii</option>
                <option value="other">Other</option>
              </select>
            </label>
            <label>Aggregator
              <input id="packingAggregator" type="text" readonly>
            </label>
            <label>Recorded by
              <input id="packingRecordedBy" type="text" readonly>
            </label>
          </fieldset>

          <fieldset>
            <legend>Measurements</legend>
            <label>Weight
              <span class="packing-measure-row">
                <input id="packingWeight" type="number" min="0.001" max="100000" step="0.001" inputmode="decimal" required>
                <select id="packingWeightUnit" aria-label="Weight unit"><option value="kg">kg</option><option value="g">g</option></select>
              </span>
            </label>
            <label>Room temperature (°C)
              <input id="packingTemperature" type="number" min="-10" max="100" step="0.1" inputmode="decimal">
            </label>
            <label>Salinity
              <span class="packing-measure-row">
                <input id="packingSalinity" type="number" min="0" max="100" step="0.01" inputmode="decimal">
                <select id="packingSalinityUnit" aria-label="Salinity unit"><option value="PSU">PSU</option><option value="ppt">ppt</option></select>
              </span>
            </label>
            <label>pH
              <input id="packingPh" type="number" min="0" max="14" step="0.01" inputmode="decimal">
            </label>
            <label>Electrical conductivity (mS/cm)
              <input id="packingEc" type="number" min="0" max="500" step="0.01" inputmode="decimal">
            </label>
          </fieldset>

          <fieldset>
            <legend>Stabilization</legend>
            <label>Chemical
              <input id="packingChemical" type="text" value="Sodium benzoate" readonly>
            </label>
            <label>Chemical dose
              <span class="packing-measure-row">
                <input id="packingDose" type="number" min="0" max="100000" step="0.001" inputmode="decimal">
                <select id="packingDoseUnit" aria-label="Chemical dose unit"><option value="g/L">g/L</option><option value="mg/L">mg/L</option><option value="%">%</option></select>
              </span>
            </label>
            <label>Notes
              <textarea id="packingNotes" rows="3" maxlength="1000"></textarea>
            </label>
          </fieldset>

          <div class="button-row packing-record-actions">
            <button id="savePackingRecord" type="submit">Save packing record</button>
            <button id="clearPackingRecord" type="button">Clear</button>
            <p id="packingRecordStatus" class="admin-status" aria-live="polite"></p>
          </div>
        </form>
      </section>
    </section>
  </main>
  <script type="module" src="./assets/js/admin_page.js?v=20"></script>
  <script type="module" src="./assets/js/stabilization_packing_form.js"></script>
</body>
</html>
