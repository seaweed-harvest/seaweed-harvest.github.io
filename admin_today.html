<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <meta name="robots" content="noindex,nofollow">
  <title>Admin Today's Intake - Seaweed Aggregation</title>
  <link rel="stylesheet" href="./assets/css/ag.css">
</head>
<body class="admin-console-page">
  <header class="app-header">
    <div class="app-header-inner">
      <div>
        <p class="eyebrow">Seaweed aggregation</p>
        <h1>Admin</h1>
      </div>
      <div class="header-actions admin-header-controls">
        <nav class="app-nav" aria-label="Main navigation">
          <a href="./collection.html">Collection</a>
          <a href="./admin.html" aria-current="page">Admin</a>
        </nav>
        <span id="adminConnectionStatus" class="status-pill status-muted">Loading</span>
      </div>
    </div>
  </header>

  <main class="app-shell admin-shell admin-layout">
    <aside class="admin-sidebar" aria-label="Admin menu">
      <h2>Admin</h2>
      <a href="./admin.html">Dashboard</a>
      <p class="admin-menu-heading">Registry</p>
      <a href="./admin_member_registry.html">Member Registry</a>
      <a href="./admin_community_registry.html">Community Registry</a>
      <p class="admin-menu-heading">Map</p>
      <a href="./admin_map.html">Community Map</a>
      <p class="admin-menu-heading">Data</p>
      <a href="./admin_today.html" aria-current="page">Today's Intake</a>
      <a href="./admin_monthly.html">Monthly</a>
      <a href="./admin_community.html">Per Community</a>
      <a href="./admin_ledger.html">Collection Ledger</a>
      <p class="admin-menu-heading">Tools</p>
      <a href="./tags.html">Tags</a>
    </aside>

    <section class="admin-content">
      <section class="panel admin-page-section">
        <div class="section-head compact admin-section-title">
          <h2>Today's Intake</h2>
          <span id="todayIntakeCount" class="status-pill">0 rows</span>
        </div>

        <div class="admin-card-body standalone">
          <div class="admin-toolbar admin-filter-grid intake-filter-grid">
            <label>
              Intake date
              <input id="todayIntakeDate" type="date">
            </label>
            <button id="reloadTodayIntake" type="button">Load</button>
            <span id="todayIntakeStatus" class="admin-status" aria-live="polite"></span>
          </div>

          <div id="todayEditActions" class="today-edit-actions" hidden>
            <span id="todaySelectedCount" class="status-pill">0 selected</span>
            <button id="todayStartEdit" type="button">Edit</button>
            <button id="todaySaveEdits" type="button" hidden disabled>Save</button>
            <button id="todayDiscardEdits" type="button" hidden>Discard changes</button>
            <button id="todayDeleteSelected" class="danger-button" type="button">Delete</button>
          </div>

          <div class="responsive-table-wrap">
            <table class="management-table admin-data-table today-intake-table">
              <thead>
                <tr>
                  <th id="todaySelectionHeader" class="selection-cell"><input id="todaySelectAll" type="checkbox" aria-label="Select all intake rows"></th>
                  <th><button type="button" data-today-sort="collected_at">Collected</button></th>
                  <th><button type="button" data-today-sort="transaction_id">Transaction</button></th>
                  <th><button type="button" data-today-sort="community_id">Community</button></th>
                  <th><button type="button" data-today-sort="farmer_id">Member</button></th>
                  <th><button type="button" data-today-sort="sack_id">Sack ID</button></th>
                  <th><button type="button" data-today-sort="sack_weight_kg">Weight kg</button></th>
                  <th><button type="button" data-today-sort="seaweed_type">Type</button></th>
                  <th><button type="button" data-today-sort="seaweed_grade">Grade</button></th>
                  <th><button type="button" data-today-sort="price_per_kg">Price/kg</button></th>
                  <th><button type="button" data-today-sort="total_price">Total KSH</button></th>
                  <th><button type="button" data-today-sort="notes">Notes</button></th>
                </tr>
              </thead>
              <tbody id="todayIntakeRows"></tbody>
            </table>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script type="module" src="./assets/js/admin_page.js?v=17"></script>
</body>
</html>
