<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <meta name="robots" content="noindex,nofollow">
  <title>Farmer Account - Seaweed Aggregation</title>
  <link rel="stylesheet" href="./assets/css/ag.css">
</head>
<body class="farmer-account-page">
  <header class="app-header">
    <div class="app-header-inner">
      <div><p class="eyebrow">Seaweed aggregation</p><h1>My Seaweed</h1></div>
      <div class="header-actions farmer-header-controls"><nav class="app-nav" aria-label="Main navigation"><a href="./my_transactions.html">My Transactions</a><a id="farmerCollectionLink" href="./collection.html">Collection</a></nav></div>
    </div>
  </header>
  <main class="app-shell farmer-account-shell">
    <section class="panel">
      <div class="section-head compact"><h2 id="farmerAccountName">Account</h2><span id="farmerAccountId" class="status-pill">-</span></div>
      <dl class="farmer-profile-grid">
        <div data-dashboard-widget="farm_profile"><dt>Community</dt><dd id="farmerAccountCommunity">-</dd></div>
        <div data-dashboard-widget="farm_profile"><dt>Farm size</dt><dd id="farmerAccountFarmSize">-</dd></div>
        <div data-dashboard-widget="total_kg"><dt>Total kg</dt><dd id="farmerAccountTotalKg">-</dd></div>
        <div data-dashboard-widget="grade_breakdown"><dt>Grade A kg</dt><dd id="farmerAccountGradeAKg">-</dd></div>
        <div data-dashboard-widget="grade_breakdown"><dt>Grade B kg</dt><dd id="farmerAccountGradeBKg">-</dd></div>
        <div data-dashboard-widget="grade_breakdown"><dt>Grade C kg</dt><dd id="farmerAccountGradeCKg">-</dd></div>
        <div data-dashboard-widget="estimated_ksh"><dt>Estimated KSH</dt><dd id="farmerAccountEstimatedKsh">-</dd></div>
        <div data-dashboard-widget="collection_count"><dt>Collections</dt><dd id="farmerAccountCollectionCount">-</dd></div>
        <div data-dashboard-widget="last_collection"><dt>Last collection</dt><dd id="farmerAccountLastCollection">-</dd></div>
      </dl>
    </section>
    <section class="panel" data-dashboard-widget="recent_records">
      <div class="section-head compact"><h2>My Harvest Records</h2></div>
      <div class="responsive-table-wrap compact-data-table-wrap">
        <table class="management-table admin-data-table">
          <thead><tr><th>Date</th><th>Aggregator</th><th>Receipt</th><th>Sack</th><th>Weight kg</th><th>Type</th><th>Grade</th><th>Form</th><th>Price/kg</th><th>Total</th><th></th></tr></thead>
          <tbody id="farmerCollectionRows"></tbody>
        </table>
      </div>
      <p id="farmerAccountStatus" class="form-status" aria-live="polite"></p>
    </section>
  </main>
  <script type="module" src="./assets/js/fixed_table_scrollbar.js?v=1"></script>
  <script type="module" src="./assets/js/farmer_page.js?v=18"></script>
</body>
</html>
