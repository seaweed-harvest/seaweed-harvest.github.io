<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <meta name="robots" content="noindex,nofollow">
  <title>Reef Nursery Records - Seaweed Harvest</title>
  <link rel="stylesheet" href="./assets/css/ag.css">
  <link rel="stylesheet" href="./assets/css/reef_nursery.css?v=2">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Seaweed Harvest">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/images/seaweed-harvest-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/images/seaweed-harvest-apple-touch-icon.png">
  <script type="module" src="./assets/js/pwa_bootstrap.js"></script>
</head>
<body class="admin-console-page reef-nursery-records-page form-record-page" data-auth-pending>
  <header class="app-header">
    <div class="app-header-inner">
      <div><p class="eyebrow">Seaweed aggregation</p><h1>Admin</h1></div>
      <div class="header-actions admin-header-controls">
        <nav class="app-nav" aria-label="Main navigation"><a href="./collection.html">Collection</a><a href="./today.html">Today's Intake</a><a href="./home.html">Home</a></nav>
      </div>
    </div>
  </header>
  <main class="app-shell admin-shell admin-layout form-record-layout">
    <aside class="admin-sidebar form-page-sidebar" aria-label="Application menu">
      <h2>Admin</h2><a href="./home.html">Dashboard</a>
      <p class="admin-menu-heading">Registry</p><a href="./admin_member_registry.html">Member Registry</a><a href="./admin_community_registry.html">Community Registry</a>
      <p class="admin-menu-heading">Map</p><a href="./admin_map.html">Community Map</a>
      <p class="admin-menu-heading">Records</p><a href="./admin_today.html">Today's Intake</a><a href="./records.html">Record Ledgers</a>
      <p class="admin-menu-heading">Tools</p><a href="./tags.html">Tags</a>
    </aside>

    <section class="admin-content admin-page-section form-page-content">
      <section class="panel reef-records-panel">
        <div class="section-head compact">
          <div>
            <h2>Reef Nursery Records</h2>
            <p id="reefRecordsCount" class="reef-records-count">Loading records...</p>
          </div>
          <a class="reef-new-record" href="./reef_nursery.html">New record</a>
        </div>

        <div class="reef-records-toolbar">
          <label>Search
            <input id="reefRecordsSearch" type="search" placeholder="Record, trainer, location or session type" autocomplete="off">
          </label>
          <button id="reefRecordsLoad" type="button">Search</button>
          <div id="reefRecordsSelectionActions" class="reef-records-selection-actions" hidden>
            <span id="reefRecordsSelectedCount">0 selected</span>
            <button id="editReefRecord" type="button">Edit</button>
            <button id="deleteReefRecords" class="danger-action" type="button">Delete selected</button>
          </div>
        </div>

        <p id="reefRecordsStatus" class="admin-status" aria-live="polite"></p>
        <div class="reef-records-table-wrap">
          <table class="reef-records-table">
            <thead>
              <tr>
                <th class="reef-select-column"><input id="selectAllReefRecords" type="checkbox" aria-label="Select all records on this page"></th>
                <th><button type="button" data-sort="record_number">Record number <span aria-hidden="true"></span></button></th>
                <th><button type="button" data-sort="training_date">Date <span aria-hidden="true"></span></button></th>
                <th><button type="button" data-sort="trainer_name">Trainer name <span aria-hidden="true"></span></button></th>
                <th><button type="button" data-sort="location">Location <span aria-hidden="true"></span></button></th>
                <th><button type="button" data-sort="session_types">Type of session <span aria-hidden="true"></span></button></th>
              </tr>
            </thead>
            <tbody id="reefRecordsRows"></tbody>
          </table>
        </div>
        <div class="reef-records-pagination">
          <button id="previousReefRecords" type="button">Previous</button>
          <span id="reefRecordsPage">Page 1</span>
          <button id="nextReefRecords" type="button">Next</button>
        </div>
      </section>
    </section>
  </main>
  <script type="module" src="./assets/js/admin_page.js?v=27"></script>
  <script type="module" src="./assets/js/reef_nursery_records.js?v=2"></script>
</body>
</html>
