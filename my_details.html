<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <meta name="robots" content="noindex,nofollow">
  <title>My Profile - Seaweed Harvest</title>
  <link rel="stylesheet" href="./assets/css/ag.css">
</head>
<body class="my-details-page" data-auth-pending>
  <header class="app-header">
    <div class="app-header-inner">
      <div><p class="eyebrow">Seaweed aggregation</p><h1>My Profile</h1></div>
      <div class="header-actions my-details-header-controls">
        <nav class="app-nav" aria-label="Account navigation"><a id="myDetailsHomeLink" href="./access_pending.html">Account home</a></nav>
      </div>
    </div>
  </header>

  <main class="app-shell my-details-shell">
    <section class="panel my-details-panel">
      <form id="myDetailsForm" class="my-details-form">
        <label id="myDetailsFarmerIdField" hidden>Farmer ID<input id="myDetailsFarmerId" type="text" readonly></label>
        <label>Name<input id="myDetailsName" type="text" autocomplete="name" minlength="2" maxlength="100" required></label>
        <label>Email<input id="myDetailsEmail" type="email" autocomplete="email" readonly></label>
        <label>Phone number<input id="myDetailsPhone" type="tel" autocomplete="tel" maxlength="40"></label>
        <label>Address<textarea id="myDetailsAddress" rows="3" autocomplete="street-address" maxlength="500"></textarea></label>
        <label>Date of birth<input id="myDetailsDateOfBirth" type="date" autocomplete="bday"></label>
        <fieldset id="myReceiptPreferences" class="my-details-preferences" hidden>
          <legend>Receipt delivery</legend>
          <label>Send receipts by<select id="myReceiptDelivery"><option value="none">Do not send</option><option value="email">Email</option><option value="sms">SMS</option><option value="both">Email and SMS</option></select></label>
          <label>Receipt email<input id="myReceiptEmail" type="email" autocomplete="email"></label>
          <label>Receipt phone<input id="myReceiptPhone" type="tel" autocomplete="tel"></label>
          <label>Receipt language<select id="myReceiptLanguage"><option value="en">English</option><option value="sw">Kiswahili</option></select></label>
          <label class="check-row"><input id="myReceiptNotifications" type="checkbox" checked> Allow transaction notifications</label>
        </fieldset>
        <fieldset id="myDashboardPreferences" class="my-details-preferences" hidden>
          <legend>Dashboard display</legend>
          <div id="myDashboardPreferenceOptions" class="dashboard-preference-options"></div>
        </fieldset>
        <div class="button-row">
          <button id="saveMyDetails" type="submit">Save details</button>
          <span id="myDetailsStatus" class="form-status" aria-live="polite"></span>
        </div>
      </form>

      <section class="my-password-section" aria-labelledby="myPasswordHeading">
        <h2 id="myPasswordHeading">Change password</h2>
        <form id="myPasswordForm" class="my-password-form">
          <label>New password<input id="myNewPassword" type="password" autocomplete="new-password" minlength="10" required></label>
          <label>Confirm password<input id="myConfirmPassword" type="password" autocomplete="new-password" minlength="10" required></label>
          <div class="button-row">
            <button id="saveMyPassword" type="submit">Update password</button>
            <span id="myPasswordStatus" class="form-status" aria-live="polite"></span>
          </div>
        </form>
      </section>
    </section>
  </main>

  <script type="module" src="./assets/js/my_details_page.js?v=19"></script>
</body>
</html>
