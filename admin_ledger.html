<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Opening Record Ledgers - Seaweed Harvest</title>
  <link rel="stylesheet" href="./assets/css/ag.css">
</head>
<body class="route-redirect-page">
  <main class="route-redirect-status" aria-live="polite">
    <p>Opening Record Ledgers...</p>
    <a id="ledgerRedirectLink" href="./records.html?category=intake">Continue</a>
  </main>
  <script>
    (() => {
      const target = new URL("./records.html", window.location.href);
      new URLSearchParams(window.location.search).forEach((value, key) => {
        target.searchParams.set(key, value);
      });
      target.searchParams.set("category", "intake");
      document.getElementById("ledgerRedirectLink").href = target.href;
      window.location.replace(target.href);
    })();
  </script>
</body>
</html>
