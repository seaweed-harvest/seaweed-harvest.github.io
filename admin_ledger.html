<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <meta name="robots" content="noindex,nofollow">
  <title>Admin Collection Ledger - Seaweed Aggregation</title>
  <link rel="stylesheet" href="./assets/css/ag.css">
</head>
<body class="admin-console-page">
  <header class="app-header">
    <div class="app-header-inner">
      <div>
        <p class="eyebrow">Seaweed aggregation</p>
        <h1>Admin</h1>
      </div>
      <div class="header-actions admin-header-controls">
        <nav class="app-nav" aria-label="Main navigation">
          <a href="./index.html">Collection</a>
          <a href="./admin.html" aria-current="page">Admin</a>
        </nav>
        <span id="adminConnectionStatus" class="status-pill status-muted">Loading</span>
      </div>
    </div>
  </header>

  <main class="app-shell admin-shell admin-layout">
    <aside class="admin-sidebar" aria-label="Admin menu">
      <h2>Admin</h2>
      <a href="./admin.html">Dashboard</a>
      <p class="admin-menu-heading">Registry</p>
      <a href="./admin_registry.html#member-registry">Member Registry</a>
      <a href="./admin_registry.html#community-registry">Community Registry</a>
      <p class="admin-menu-heading">Map</p>
      <a href="./admin_map.html">Community Map</a>
      <p class="admin-menu-heading">Data</p>
      <a href="./admin_today.html">Today's Intake</a>
      <a href="./admin_monthly.html">Monthly</a>
      <a href="./admin_community.html">Per Community</a>
      <a href="./admin_ledger.html" aria-current="page">Collection Ledger</a>
      <p class="admin-menu-heading">Tools</p>
      <a href="./tags.html">Tags</a>
    </aside>

    <section class="admin-content">
      <section class="panel admin-page-section">
        <div class="section-head compact admin-section-title">
          <h2>Collection Ledger</h2>
          <span id="ledgerCount" class="status-pill">0 rows</span>
        </div>
        <div class="admin-card-body standalone">
          <div class="admin-toolbar admin-filter-grid">
            <label>
              Period
              <select id="ledgerPeriodPreset">
                <option value="30">Last 30 days</option>
                <option value="7">Last 7 days</option>
                <option value="this_month">This month</option>
                <option value="month">Selected month</option>
                <option value="custom">Custom dates</option>
                <option value="all">Search all records</option>
              </select>
            </label>
            <label>
              Month
              <input id="ledgerMonth" type="month">
            </label>
            <label>
              From
              <input id="ledgerStartDate" type="date">
            </label>
            <label>
              To
              <input id="ledgerEndDate" type="date">
            </label>
            <label>
              Community
              <select id="ledgerCommunity"></select>
            </label>
            <label>
              Grade
              <select id="ledgerGrade">
                <option value="">All grades</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
              </select>
            </label>
            <label>
              Search
              <input id="ledgerSearch" type="search" autocomplete="off" placeholder="Member, sack, transaction">
            </label>
            <button id="reloadLedger" type="button">Load</button>
            <button id="exportLedgerCsv" type="button">Export CSV</button>
          </div>

          <div class="ledger-pagination">
            <button id="ledgerPrevPage" type="button">Previous</button>
            <span id="ledgerPageStatus" class="admin-status">Page 1</span>
            <button id="ledgerNextPage" type="button">Next</button>
          </div>

          <div class="responsive-table-wrap">
            <table class="management-table admin-data-table ledger-table">
              <thead>
                <tr>
                  <th><button type="button" data-ledger-sort="collected_at">Collected</button></th>
                  <th><button type="button" data-ledger-sort="transaction_id">Transaction</button></th>
                  <th><button type="button" data-ledger-sort="community_id">Community</button></th>
                  <th><button type="button" data-ledger-sort="farmer_id">Member</button></th>
                  <th><button type="button" data-ledger-sort="sack_id">Sack ID</button></th>
                  <th><button type="button" data-ledger-sort="sack_weight_kg">Weight kg</button></th>
                  <th><button type="button" data-ledger-sort="seaweed_type">Type</button></th>
                  <th><button type="button" data-ledger-sort="seaweed_grade">Grade</button></th>
                  <th><button type="button" data-ledger-sort="price_per_kg">Price/kg</button></th>
                  <th><button type="button" data-ledger-sort="total_price">Total KSH</button></th>
                  <th>GPS</th>
                  <th>Photos</th>
                  <th>Notes</th>
                  <th><button type="button" data-ledger-sort="created_at">Saved</button></th>
                </tr>
              </thead>
              <tbody id="ledgerRows"></tbody>
            </table>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script type="module" src="./assets/js/admin_page.js"></script>
</body>
</html>
