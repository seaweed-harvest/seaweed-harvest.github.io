<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <meta name="robots" content="noindex,nofollow">
  <meta name="referrer" content="no-referrer">
  <title>Reset Password - Seaweed Harvest</title>
  <link rel="preload" as="image" href="./assets/images/seaweed-harvest-logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./assets/css/ag.css">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Seaweed Harvest">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/images/seaweed-harvest-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/images/seaweed-harvest-apple-touch-icon.png">
  <script type="module" src="./assets/js/pwa_bootstrap.js"></script>
</head>
<body class="auth-page" data-auth-pending>
  <div class="auth-session-loader" role="status" aria-label="Checking password reset link">
    <img src="./assets/images/seaweed-harvest-logo.svg" alt="" fetchpriority="high">
  </div>

  <main class="auth-shell auth-gateway-shell">
    <div class="auth-brand-animation" aria-label="Seaweed Harvest">
      <img class="auth-brand-logo" src="./assets/images/seaweed-harvest-logo.svg" alt="Seaweed Harvest" fetchpriority="high">
    </div>

    <section class="panel auth-panel">
      <h1>Choose New Password</h1>
      <p id="adminResetAccount" class="compact-note" hidden>Reset password for <strong id="adminResetAccountName"></strong></p>
      <form id="adminResetForm" class="stack-form">
        <label>New password<input id="adminResetPassword" type="password" autocomplete="new-password" minlength="10" required></label>
        <label>Confirm password<input id="adminResetConfirm" type="password" autocomplete="new-password" minlength="10" required></label>
        <button id="adminResetSubmit" type="submit">Save password and sign in</button>
      </form>
      <a class="auth-account-link" href="./login.html">Back to sign in</a>
    </section>

    <p id="adminResetStatus" class="form-status" aria-live="polite"></p>
  </main>

  <script type="module" src="./assets/js/reset_password_page.js?v=2"></script>
</body>
</html>
