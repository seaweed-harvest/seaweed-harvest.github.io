<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <meta name="robots" content="noindex,nofollow">
  <title>Tags - Seaweed Aggregation</title>
  <link rel="stylesheet" href="./assets/css/ag.css">
</head>
<body class="admin-console-page tags-page">
  <header class="app-header">
    <div class="app-header-inner">
      <div>
        <p class="eyebrow">Seaweed aggregation</p>
        <h1>Admin</h1>
      </div>
      <div class="header-actions">
        <nav class="app-nav" aria-label="Main navigation">
          <a href="./collection.html">Collection</a>
          <a href="./admin.html" aria-current="page">Admin</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="app-shell admin-shell admin-layout">
    <aside class="admin-sidebar" aria-label="Admin menu">
      <h2>Admin</h2>
      <a href="./admin.html">Dashboard</a>
      <p class="admin-menu-heading">Registry</p>
      <a href="./admin_member_registry.html">Member Registry</a>
      <a href="./admin_community_registry.html">Community Registry</a>
      <p class="admin-menu-heading">Map</p>
      <a href="./admin_map.html">Community Map</a>
      <p class="admin-menu-heading">Data</p>
      <a href="./admin_today.html">Today's Intake</a>
      <a href="./admin_monthly.html">Monthly</a>
      <a href="./admin_community.html">Per Community</a>
      <a href="./admin_ledger.html">Collection Ledger</a>
      <p class="admin-menu-heading">Tools</p>
      <a href="./tags.html" aria-current="page">Tags</a>
    </aside>

    <section class="admin-content tag-shell">
      <section class="panel tag-controls-panel">
        <div class="section-head compact">
          <h2>Tags</h2>
        </div>
      <form id="tagGeneratorForm" class="tag-generator-form">
        <label>
          Tag type
          <select id="tagType">
            <option value="farmer">Farmer RID</option>
            <option value="sack">Sack ID</option>
            <option value="custom">Custom list</option>
          </select>
        </label>
        <label>
          Prefix
          <input id="tagPrefix" type="text" value="RID" autocomplete="off">
        </label>
        <label>
          Start number
          <input id="tagStartNumber" type="number" min="0" step="1" value="4300">
        </label>
        <label>
          Quantity
          <input id="tagQuantity" type="number" min="1" max="240" step="1" value="24">
        </label>
        <label>
          Digits
          <input id="tagDigits" type="number" min="0" max="8" step="1" value="4">
        </label>
        <label>
          Width mm
          <input id="tagWidthMm" type="number" min="25" max="120" step="1" value="60">
        </label>
        <label>
          Height mm
          <input id="tagHeightMm" type="number" min="20" max="80" step="1" value="35">
        </label>
        <label>
          QR mm
          <input id="tagQrMm" type="number" min="14" max="60" step="1" value="24">
        </label>
        <label class="wide-field">
          Custom IDs
          <textarea id="customIds" rows="4" placeholder="RID4300&#10;RID4301&#10;B-0001"></textarea>
        </label>
        <div class="button-row wide-field">
          <button id="generateTags" type="submit">Generate</button>
          <button id="printTags" type="button">Print</button>
          <span id="tagCountStatus" class="admin-status" aria-live="polite"></span>
        </div>
      </form>
      </section>

      <section class="panel tag-sheet-panel" aria-label="Printable tag sheet">
        <div id="tagSheet" class="tag-sheet"></div>
      </section>
    </section>
  </main>

  <script type="module" src="./assets/js/admin_page.js"></script>
  <script src="./assets/js/vendor/qrcode-generator.js"></script>
  <script src="./assets/js/tag_generator.js"></script>
</body>
</html>
