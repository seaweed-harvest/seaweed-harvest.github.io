<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <meta name="robots" content="noindex,nofollow">
  <title>Admin Map - Seaweed Aggregation</title>
  <link rel="stylesheet" href="./assets/vendor/leaflet/leaflet.css">
  <link rel="stylesheet" href="./assets/css/ag.css">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Seaweed Harvest">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/images/seaweed-harvest-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/images/seaweed-harvest-apple-touch-icon.png">
  <script type="module" src="./assets/js/pwa_bootstrap.js"></script>
</head>
<body class="admin-console-page" data-auth-pending>
  <header class="app-header">
    <div class="app-header-inner">
      <div>
        <p class="eyebrow">Seaweed aggregation</p>
        <h1>Admin</h1>
      </div>
      <div class="header-actions admin-header-controls">
        <nav class="app-nav" aria-label="Main navigation">
          <a href="./collection.html">Collection</a>
          <a href="./home.html">Home</a>
        </nav>
        <span id="adminConnectionStatus" class="status-pill status-muted">Loading</span>
      </div>
    </div>
  </header>

  <main class="app-shell admin-shell admin-layout">
    <aside class="admin-sidebar" aria-label="Admin menu">
      <h2>Admin</h2>
      <a href="./home.html">Dashboard</a>
      <p class="admin-menu-heading">Registry</p>
      <a href="./admin_member_registry.html">Member Registry</a>
      <a href="./admin_community_registry.html">Community Registry</a>
      <p class="admin-menu-heading">Map</p>
      <a href="./admin_map.html" aria-current="page">Community Map</a>
      <p class="admin-menu-heading">Records</p>
      <a href="./admin_today.html">Today's Intake</a>
      <a href="./admin_monthly.html">Monthly</a>
      <a href="./admin_community.html">Per Community</a>
      <a href="./records.html">Record Ledgers</a>
      <p class="admin-menu-heading">Tools</p>
      <a href="./tags.html">Tags</a>
    </aside>

    <section class="admin-content">
      <section class="panel admin-page-section">
        <div class="section-head compact admin-section-title">
          <h2>Map</h2>
          <span id="mapStatus" class="status-pill status-muted">Loading</span>
        </div>
        <div class="map-recency-legend" aria-label="Harvest recency legend">
          <span><i class="map-marker-sample latest-harvest" aria-hidden="true">&#127807;</i> Latest</span>
          <span><i class="map-marker-sample week-harvest" aria-hidden="true">&#127807;</i> 7 days</span>
          <span><i class="map-marker-sample month-harvest" aria-hidden="true">&#127807;</i> 30 days</span>
          <span><i class="map-marker-sample older-harvest" aria-hidden="true">&#127807;</i> Older</span>
          <span><i class="map-marker-sample never-harvested" aria-hidden="true">&#127807;</i> Never</span>
        </div>
        <div class="admin-map-layout">
          <div class="admin-map-panel">
            <div id="adminCommunityMap" class="admin-map" role="application" aria-label="Community map"></div>
            <div id="adminMapFallback" class="empty-state map-fallback" hidden></div>
          </div>
          <div class="map-list-stack">
            <details class="panel map-list-panel map-list-details">
              <summary class="admin-card-summary map-list-summary">
                <span>
                  <strong>Farm List</strong>
                </span>
                <span id="mappedCommunityCount" class="status-pill">0</span>
              </summary>
              <div id="mappedCommunityList" class="map-table-wrap"></div>
            </details>
            <section class="panel map-list-panel">
              <div class="section-head compact">
                <h3>Needs GPS</h3>
                <span id="missingGpsCount" class="status-pill status-muted">0</span>
              </div>
              <div id="missingGpsList" class="map-table-wrap"></div>
            </section>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="./assets/vendor/leaflet/leaflet.js"></script>
  <script type="module" src="./assets/js/fixed_table_scrollbar.js?v=1"></script>
  <script type="module" src="./assets/js/admin_page.js?v=27"></script>
</body>
</html>
