<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <meta name="robots" content="noindex,nofollow">
  <title>Today's Intake - Seaweed Aggregation</title>
  <link rel="stylesheet" href="./assets/css/ag.css">
</head>
<body class="public-intake-page">
  <header class="app-header">
    <div class="app-header-inner">
      <div>
        <p class="eyebrow">Seaweed aggregation</p>
        <h1>Today's Intake</h1>
      </div>
      <div class="header-actions">
        <nav class="app-nav" aria-label="Main navigation">
          <a href="./index.html">Collection</a>
          <a href="./today.html" aria-current="page">Today's Intake</a>
          <a id="todayAdminLink" href="./admin.html" hidden>Admin</a>
          <a id="todaySignInLink" href="./login.html?return=today.html">Sign in</a>
        </nav>
        <span id="todayConnectionStatus" class="status-pill status-muted">Loading</span>
      </div>
    </div>
  </header>

  <main class="app-shell public-intake-shell">
    <section class="panel public-intake-panel">
      <div class="section-head compact">
        <div>
          <h2>Mawimbi intake</h2>
          <p id="todayIntakeDate" class="field-hint"></p>
        </div>
        <div class="button-row compact-actions">
          <span id="publicTodayCount" class="status-pill">0 rows</span>
          <button id="reloadPublicToday" type="button">Reload</button>
        </div>
      </div>

      <div class="responsive-table-wrap public-intake-table-wrap">
        <table class="management-table admin-data-table public-intake-table">
          <thead>
            <tr>
              <th>Time</th>
              <th>Transaction</th>
              <th>Community</th>
              <th>Farmer ID</th>
              <th>Sack ID</th>
              <th>Weight kg</th>
              <th>Type</th>
              <th>Grade</th>
              <th>Collector</th>
            </tr>
          </thead>
          <tbody id="publicTodayRows">
            <tr><td colspan="9" class="empty-state">Loading today's intake...</td></tr>
          </tbody>
        </table>
      </div>
      <p id="publicTodayStatus" class="admin-status" aria-live="polite"></p>
    </section>
  </main>

  <script type="module" src="./assets/js/today_page.js"></script>
</body>
</html>
